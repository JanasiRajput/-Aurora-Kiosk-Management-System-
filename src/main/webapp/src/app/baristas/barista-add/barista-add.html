<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="glass-panel p-5">
      <h2 class="text-gold mb-4 text-center">Add Barista</h2>

      <div class="mb-4">
        <label class="form-label text-white-50">Barista Name</label>
        <input [(ngModel)]="barista.name" class="form-control form-control-lg" placeholder="e.g. John Doe" />
      </div>

      <div class="d-grid mt-4">
        <button (click)="addBarista()" class="btn btn-primary btn-lg rounded-pill shadow-sm">
          Onboard Barista
        </button>
      </div>
    </div>
  </div>
</div>
