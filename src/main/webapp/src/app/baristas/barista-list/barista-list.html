<div class="row mt-5">
  <div class="col-12">
    <div class="glass-panel p-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-gold m-0">Team Roster</h2>
        <a routerLink="/barista-add" class="btn btn-primary px-4 rounded-pill">Add Barista</a>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th scope="col" class="ps-4">ID</th>
              <th scope="col">Name</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let b of baristaService.baristas()">
              <td class="ps-4 text-white-50 w-25">#{{ b.id }}</td>
              <td class="fw-semibold">
                <div class="d-flex align-items-center">
                  <div class="avatar bg-secondary rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                    {{ b.name.charAt(0) }}
                  </div>
                  {{ b.name }}
                </div>
              </td>
            </tr>
            <tr *ngIf="baristaService.baristas().length === 0">
              <td colspan="2" class="text-center py-5 text-white-50">No baristas exist yet.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
