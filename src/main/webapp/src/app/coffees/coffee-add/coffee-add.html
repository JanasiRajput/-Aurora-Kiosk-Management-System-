<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="glass-panel p-5">
      <h2 class="text-gold mb-4 text-center">Add Coffee</h2>

      <div class="mb-3">
        <label class="form-label text-white-50">Name</label>
        <input [(ngModel)]="coffee.name" class="form-control form-control-lg" placeholder="e.g. Arabica Dark Roast" />
      </div>

      <div class="mb-3">
        <label class="form-label text-white-50">Price</label>
        <input type="number" [(ngModel)]="coffee.price" class="form-control form-control-lg" placeholder="e.g. 5.99" />
      </div>

      <div class="mb-3">
        <label class="form-label text-white-50">Quantity</label>
        <input type="number" [(ngModel)]="coffee.quantity" class="form-control form-control-lg" placeholder="e.g. 100" />
      </div>

      <div class="mb-4">
        <label class="form-label text-white-50">Employee</label>
        <select [(ngModel)]="coffee.employeeName" class="form-select form-control-lg bg-dark text-light border-secondary">
          <option value="" disabled selected>Select Barista</option>
          <option *ngFor="let b of baristas" [value]="b.name">
            {{ b.name }}
          </option>
        </select>
      </div>

      <div class="d-grid mt-4">
        <button (click)="addCoffee()" class="btn btn-primary btn-lg rounded-pill shadow-sm">
          Save Coffee Entry
        </button>
      </div>
    </div>
  </div>
</div>
